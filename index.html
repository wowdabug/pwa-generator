<!DOCTYPE html>
<html lang="en">
    <head>
		<meta charset="UTF-8">
		<meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>PWA Generator</title>
		<link rel="manifest" href="manifest.json">
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
		<script>
            const DEBUG = false;
            if (!DEBUG) {
                if ("serviceWorker" in navigator) {
                    navigator.serviceWorker.register("./sw.js", {
                        scope: "./" 
                    });
                }
            }
		</script>
        <div id="container">
            <h1>Index</h1>
            <label for="title">Title</label>
            <input type="text" id="title" placeholder="Default">
            <hr>
            <h1>Manifest</h1>
            <label for="short-name" class="tooltip">
                Short Name
                <a href="https://developer.mozilla.org/en-US/docs/Web/Progressive_web_apps/Manifest/Reference/short_name" target="_blank">Info</a>
            </label>
            <input type="text" id="short-name" placeholder="Default">
            <label for="name">
                Name
                <a href="https://developer.mozilla.org/en-US/docs/Web/Progressive_web_apps/Manifest/Reference/name" target="_blank">Info</a>
            </label>
            <input type="text" id="name" placeholder="Default">
            <br>
            <label for="start-url">
                Start URL
                <a href="https://developer.mozilla.org/en-US/docs/Web/Progressive_web_apps/Manifest/Reference/start_url" target="_blank">Info</a>
            </label>
            <input type="text" id="start-url" placeholder="./">
            <br>
            <label for="display">
                Display
                <a href="https://developer.mozilla.org/en-US/docs/Web/Progressive_web_apps/Manifest/Reference/display" target="_blank">Info</a>
            </label>
            <input type="text" id="display" placeholder="standalone">
            <br>
            <label for="theme-color">
                Theme Color
                <a href="https://developer.mozilla.org/en-US/docs/Web/Progressive_web_apps/Manifest/Reference/theme_color" target="_blank">Info</a>
            </label>
            <input type="text" id="theme-color" placeholder="#000000">
            <br>
            <label for="background-color">
                Background Color
                <a href="https://developer.mozilla.org/en-US/docs/Web/Progressive_web_apps/Manifest/Reference/background_color" target="_blank">Info</a>
            </label>
            <input type="text" id="background-color" placeholder="#ffffff">
            <hr>
            <h1>Service Worker</h1>
            <label for="cache-name">
                Cache Name
                <a href="https://developer.mozilla.org/en-US/docs/Web/API/Cache" target="_blank">Info</a>
            </label>
            <input type="text" id="cache-name" placeholder="default-v0">
            <hr>
            <h1>Other</h1>
            <label for="default-files">Default Files</label>
            <input type="text" id="default-files" placeholder="main.js, style.css">
            <label for="favicon">Favicon</label>
            <input type="file" id="favicon" accept="image/png">
            <label for="favicon-sizes">Favicon Sizes</label>
            <input type="text" id="favicon-sizes" placeholder="192, 512">
            <label for="file-name">File Name</label>
            <input type="text" id="file-name" placeholder="Default">
            <hr>
            <button id="submit" type="submit">Generate Template</button>
            <script src="lib/jszip.js"></script>
            <script src="main.js"></script>
        </div>
    </body>
</html>
