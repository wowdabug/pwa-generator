<!DOCTYPE html>
<html lang="en">
    <head>
		<meta charset="UTF-8">
		<meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>PWA Generator</title>
		<link rel="manifest" href="manifest.json">
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
		<script>
			if ("serviceWorker" in navigator) {
				navigator.serviceWorker.register("./sw.js", {
					scope: "./" 
				});
			}
		</script>
        <div id="container">
            <p>This tool generates a PWA automatically (including favicons)<br>Leaving inputs blank will use the placeholder values</p>
            <label for="short-name">Short Name</label>
            <input type="text" id="short-name" placeholder="Default">
            <br>
            <label for="name">Name</label>
            <input type="text" id="name" placeholder="Default">
            <br>
            <label for="favicon">Favicon</label>
            <input type="file" id="favicon" accept="image/png">
            <br>
            <label for="start-url">Start URL</label>
            <input type="text" id="start-url" placeholder="./">
            <br>
            <label for="display">Display</label>
            <select id="display">
                <option value="">--Please choose an option--</option>
                <option value="fullscreen">Fullscreen</option>
                <option value="standalone">Standalone</option>
                <option value="minimal-ui">Minimal UI</option>
                <option value="browser">Browser</option>
            </select>
            <br>
            <label for="start-url">Theme Color</label>
            <input type="text" id="theme-color" placeholder="#000000">
            <br>
            <label for="start-url">Background Color</label>
            <input type="text" id="background-color" placeholder="#ffffff">
            <br>
            <label for="cache-name">Cache Name</label>
            <input type="text" id="cache-name" placeholder="default-v0">
            <br>
            <button id="submit" type="submit">Generate Template</button>
            <p id="status"></p>
            <script src="lib/jszip.js"></script>
            <script src="main.js"></script>
        </div>
    </body>
</html>
